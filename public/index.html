<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MCP Audit Kit</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Local-first agent safety</p>
            <h1>MCP Audit Kit</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="status-pill" id="apiStatus">Checking API</div>
        </div>
      </header>

      <section class="workspace" aria-label="Audit workspace">
        <div class="editor-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Input</p>
              <h2>Manifest</h2>
            </div>
            <div class="sample-actions" id="sampleActions"></div>
          </div>
          <textarea id="manifestInput" spellcheck="false" aria-label="MCP manifest JSON"></textarea>
          <div class="editor-footer">
            <button class="primary-action" id="runAudit" type="button">Run audit</button>
            <span id="inputMeta">0 lines</span>
          </div>
        </div>

        <div class="results-panel">
          <div class="score-strip">
            <div class="score-orbit" id="scoreOrbit" aria-label="Audit score">
              <span id="scoreValue">--</span>
            </div>
            <div class="score-copy">
              <p class="eyebrow">Score</p>
              <h2 id="riskLevel">Waiting</h2>
              <p id="headline">Load a sample or paste a manifest.</p>
            </div>
          </div>

          <div class="severity-grid" id="severityGrid"></div>

          <div class="signal-panel">
            <div class="signal-header">
              <div>
                <p class="eyebrow">Live surface</p>
                <h2 id="signalTitle">Risk constellation</h2>
              </div>
              <div class="signal-readout" id="signalReadout">No scan</div>
            </div>
            <div class="signal-map" id="signalMap" aria-label="Animated audit signal map"></div>
          </div>

          <div class="tabbar" role="tablist" aria-label="Result views">
            <button class="tab-button active" type="button" data-view="findings">Findings</button>
            <button class="tab-button" type="button" data-view="policy">Policy</button>
            <button class="tab-button" type="button" data-view="inventory">Inventory</button>
          </div>

          <section class="view active" id="findingsView" aria-label="Findings"></section>
          <section class="view" id="policyView" aria-label="Policy"></section>
          <section class="view" id="inventoryView" aria-label="Inventory"></section>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
