name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal manifest or config
      render: json
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
